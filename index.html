<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>ポータルサイト</title>
    <meta name="apple-mobile-web-app-title" content="ポータルサイト">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="apple-touch-icon" href="https://github.com/cnw0515/field-app/blob/main/app-icon-max.png?raw=true&v=20260404">
    
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({ appId: "05381074-341a-4512-b4b5-182563105d70" });
      });

      function startApp() {
        document.getElementById('touch-layer').style.display = 'none';
        OneSignalDeferred.push(function(OneSignal) {
          OneSignal.Notifications.requestPermission();
        });
      }
    </script>

    <style>
        body, html { 
            margin: 0; padding: 0; height: 100vh; overflow: hidden; 
            background-color: #f2f2f7; display: flex; flex-direction: column; 
        }
        
        /* 画面上部の操作バー：ここに戻るボタンを置く */
        .header-bar {
            height: 44px;
            background-color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: env(safe-area-inset-top) 15px 0 15px;
            border-bottom: 1px solid #e0e0e0;
            z-index: 10000;
            flex-shrink: 0;
        }
        .header-title { font-size: 14px; font-weight: bold; color: #333; }
        .reset-btn {
            color: #007AFF;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        
        iframe { 
            flex-grow: 1;
            width: 100%; 
            border: none; 
            padding-bottom: env(safe-area-inset-bottom);
            box-sizing: border-box;
        }
        #touch-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; background: transparent;
        }
    </style>
</head>
<body onclick="startApp()">
    <div id="touch-layer"></div>
    
    <div class="header-bar">
        <div class="header-title">ポータルサイト</div>
        <div class="reset-btn" onclick="goHome()">🏠 画面をリセット</div>
    </div>

    <iframe id="main-iframe" src="https://script.google.com/macros/s/AKfycbxsQXw26ec5mfJAlhtmR6sEGwV8gdm2B1n0lHqDhKvvde728bi2urwyW1tfKDJbOgo/exec?pw=cnw0515&v=1"></iframe>

    <script>
        function goHome() {
            // iframeの中身を最初のGASページに強制リセット
            const iframe = document.getElementById('main-iframe');
            iframe.src = "https://script.google.com/macros/s/AKfycbxsQXw26ec5mfJAlhtmR6sEGwV8gdm2B1n0lHqDhKvvde728bi2urwyW1tfKDJbOgo/exec?pw=cnw0515&v=1";
        }
    </script>
</body>
</html>
