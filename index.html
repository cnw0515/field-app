<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/q73Y9544/icon-comnetwork.png">
    
    <title>現場お助けポータル</title>

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "05381074-341a-4512-b4b5-182563105d70",
        });
      });

      function startApp() {
        document.getElementById('touch-layer').style.display = 'none';
        OneSignalDeferred.push(function(OneSignal) {
          OneSignal.Notifications.requestPermission();
        });
      }
    </script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #ffffff; }
        /* iPhoneのノッチ（上の出っ張り）対策 */
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            z-index: 1; 
            padding-top: env(safe-area-inset-top); 
            box-sizing: border-box;
        }
        #touch-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9999;
            background: transparent;
        }
    </style>
</head>
<body onclick="startApp()">
    <div id="touch-layer"></div>

    <iframe src="https://script.google.com/macros/s/AKfycbxsQXw26ec5mfJAlhtmR6sEGwV8gdm2B1n0lHqDhKvvde728bi2urwyW1tfKDJbOgo/exec?pw=cnw0515&v=1"></iframe>
</body>
</html>
