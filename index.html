<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <title>現場お助けポータル</title>

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "05381074-341a-4512-b4b5-182563105d70",
        });
      });

      // 画面上のどこかをタップした時に実行する関数
      function askNotification() {
        // 透明レイヤーを消す
        document.getElementById('touch-layer').style.display = 'none';

        // 日本語で確認。OKならiPhone標準の許可（英語）を出す
        if (confirm("現場からのお知らせを受け取りますか？\n\n※この後の画面で「許可」を選択してください。")) {
          OneSignalDeferred.push(function(OneSignal) {
            OneSignal.showNativePrompt();
          });
        }
      }
    </script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f8f9fa; }
        iframe { width: 100%; height: 100%; border: none; }
        /* 画面を1回タップさせるための透明レイヤー */
        #touch-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; display: block; }
    </style>
</head>
<body>
    <div id="touch-layer" onclick="this.style.display='none'"></div>

    <iframe src="https://script.google.com/macros/s/AKfycbxsQXw26ec5mfJAlhtmR6sEGwV8gdm2B1n0lHqDhKvvde728bi2urwyW1tfKDJbOgo/exec?pw=cnw0515"></iframe>
</body>
</html>
