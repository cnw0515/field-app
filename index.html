<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <link rel="apple-touch-icon" href="https://i.imgur.com/vH9XqC8.png?v=2">
    
    <title>現場お助けポータル</title>
    </head>

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "05381074-341a-4512-b4b5-182563105d70",
        });
      });

      // 画面を触った時に実行される関数
      function startApp() {
        // 透明な膜を消してポータルを操作可能にする
        document.getElementById('touch-layer').style.display = 'none';

        // 通知の許可を求める（iPhone標準の英語ダイアログが出ます）
        OneSignalDeferred.push(function(OneSignal) {
          OneSignal.Notifications.requestPermission();
        });
      }
    </script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f8f9fa; }
        iframe { width: 100%; height: 100%; border: none; z-index: 1; }
        /* 画面全体を覆う透明なタップ待ちエリア */
        #touch-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: transparent;
        }
    </style>
</head>
<body onclick="startApp()">
    <div id="touch-layer"></div>

    <iframe src="https://script.google.com/macros/s/AKfycbxsQXw26ec5mfJAlhtmR6sEGwV8gdm2B1n0lHqDhKvvde728bi2urwyW1tfKDJbOgo/exec?pw=cnw0515"></iframe>
</body>
</html>
