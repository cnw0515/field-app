<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">
    <title>現場お助けポータル</title>

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignal.js" async></script>
    <script>
      window.OneSignal = window.OneSignal || [];
      OneSignal.push(function() {
        OneSignal.init({
          appId: "05381074-341a-4512-b4b5-182563105d70", // あなたのAppID
          safari_web_id: "web.onesignal.auto.1772183e-990a-4712-a162-873f628f8042", // 必要なら昨日控えたものを入れる
          allowLocalhostAsSecureOrigin: true,
        });
        // ページを開いた時に通知許可を求める
        OneSignal.showNativePrompt();
      });
    </script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f8f9fa; }
        iframe { width: 100%; height: 100%; border: none; }
        /* 画面を1回タップさせるための透明なレイヤー（iOS対策） */
        #touch-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; display: block; }
    </style>
</head>
<body>
    <div id="touch-layer" onclick="this.style.display='none'"></div>

    <iframe src="https://script.google.com/macros/s/AKfycbxsQXw26ec5mfJAlhtmR6sEGwV8gdm2B1n0lHqDhKvvde728bi2urwyW1tfKDJbOgo/exec?pw=cnw0515"></iframe>
</body>
</html>
