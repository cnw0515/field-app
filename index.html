<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="apple-touch-icon" sizes="180x180" href="https://raw.githubusercontent.com/cnw0515/field-app/main/app-icon-max.png?raw=true&v=2">
    
    <title>ポータルサイトけ</title>
    <meta name="apple-mobile-web-app-title" content="ポータルサイト">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    </head>

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({ appId: "05381074-341a-4512-b4b5-182563105d70" });
      });

      function startApp() {
        document.getElementById('touch-layer').style.display = 'none';
        OneSignalDeferred.push(function(OneSignal) {
          OneSignal.Notifications.requestPermission();
        });
      }
    </script>

    <style>
        /* 背景色をGAS側の背景(#f2f2f7)と合わせることで、隙間を見えなくする */
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f2f2f7; }
        
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            z-index: 1; 
            /* 画面下部の見切れ対策: iframe自体を少し底上げする */
            padding-bottom: env(safe-area-inset-bottom);
            box-sizing: border-box;
        }
        #touch-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 9999; background: transparent;
        }
    </style>
</head>
<body onclick="startApp()">
    <div id="touch-layer"></div>
    <iframe src="https://script.google.com/macros/s/AKfycbxsQXw26ec5mfJAlhtmR6sEGwV8gdm2B1n0lHqDhKvvde728bi2urwyW1tfKDJbOgo/exec?pw=cnw0515&v=1"></iframe>
</body>
</html>
