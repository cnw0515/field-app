<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "05381074-341a-4512-b4b5-182563105d70",
      safari_web_id: "web.onesignal.auto.5a0e980e-3622-4a00-983c-6238382c5f11", // iOS用の汎用ID
      notifyButton: { enable: false }, // 余計なベルを出さない
      allowLocalhostAsSecureOrigin: true
    });
  });

  /* これを <style> の中に入れてください */
body { 
    background-color: #e5e7eb; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
}
.card { 
    background: white; 
    padding: 2rem; 
    border-radius: 1rem; 
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); 
    max-width: 400px; 
    width: 90%; 
}
h2 { color: #1f2937; margin-bottom: 1.5rem; }
.btn-portal { 
    background: #2563eb; 
    color: white; 
    margin-bottom: 1rem;
    box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
}
.btn-notify { 
    background: #dc2626; 
    color: white; 
    box-shadow: 0 4px 6px rgba(220, 38, 38, 0.2);
}
  // 赤いボタンを押した時の動作
  document.getElementById('notify-btn').addEventListener('click', function() {
    OneSignalDeferred.push(function() {
      OneSignal.Notifications.requestPermission();
    });
  });
</script>
