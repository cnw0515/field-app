<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/q73Y9544/icon-comnetwork.png?v=3">
    
    <title>現場お助けポータル</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", YuGothic, sans-serif; 
            background-color: #ffffff; overflow-x: hidden; display: flex; flex-direction: column; 
        }

        /* 検索エリア */
        .search-area { padding: 15px 20px 5px 20px; }
        .search-input { 
            width: 100%; padding: 12px 15px 12px 40px; 
            border: 1px solid #ddd; border-radius: 25px; 
            font-size: 16px; background-color: #f8f9fa; box-sizing: border-box; 
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>'); 
            background-repeat: no-repeat; background-position: 15px center; 
        }

        /* 更新リンク */
        .refresh-bar { text-align: right; padding: 0 20px; margin-bottom: 5px; }
        .refresh-link { font-size: 11px; color: #bbb; text-decoration: none; cursor: pointer; }

        /* メインコンテンツ：ボタンを画面いっぱいに広げる */
        .main-content { 
            flex: 1; display: flex; flex-direction: column; 
            padding: 0 15px 20px 15px; gap: 15px;
        }

        /* ステータスカード */
        .status-card { 
            background: linear-gradient(135deg, #4dd0e1, #00bcd4); 
            color: white; padding: 15px; border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,188,212,0.1);
        }
        .status-time { font-size: 20px; font-weight: bold; }

        /* お知らせ */
        .info-card { 
            background-color: #fff9c4; border-left: 5px solid #fbc02d; 
            padding: 10px 12px; border-radius: 5px; font-size: 13px; color: #333; 
        }

        /* ボタン配置：高さを固定せず、内容に合わせる */
        .button-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); 
            gap: 12px; width: 100%;
        }

        .menu-btn { 
            background-color: #ffffff; border: 1px solid #eee; border-radius: 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            text-decoration: none; color: #333; padding: 20px 10px; box-sizing: border-box; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); min-height: 100px;
        }
        .menu-btn:active { transform: scale(0.96); background-color: #f0f0f0; }
        .btn-icon { font-size: 28px; margin-bottom: 8px; }
        .btn-text { font-size: 13px; font-weight: bold; text-align: center; line-height: 1.3; }

        .hidden { display: none !important; }
    </style>
</head>
<body onload="initializePortal()">

    <div class="search-area">
        <input type="text" id="searchInput" class="search-input" placeholder="逆引き検索..." oninput="handleSearch()">
    </div>
    
    <div class="refresh-bar">
        <span onclick="refreshData()" class="refresh-link" id="refreshBtn">🔄 最新の情報に更新</span>
    </div>

    <div class="main-content">
        <div class="status-card" id="statusArea">
            <div style="font-size:12px; opacity:0.9;">現場ポータル稼働中</div>
            <div class="status-time" id="lastUpdateTime">Loading...</div>
        </div>

        <div id="newsArea" style="display:flex; flex-direction:column; gap:8px;"></div>

        <div class="button-grid" id="btnContainer"></div>
    </div>

    <script>
        // キャッシュを利用して高速起動
        function initializePortal() {
            const cached = localStorage.getItem('portal_cache');
            if (cached) {
                renderPortal(JSON.parse(cached));
            }
            loadDataFromServer();
        }

        function loadDataFromServer(isManual = false) {
            const btn = document.getElementById('refreshBtn');
            if (isManual) btn.innerText = "⏳ 更新中...";

            google.script.run
                .withSuccessHandler(function(data) {
                    localStorage.setItem('portal_cache', JSON.stringify(data));
                    renderPortal(data);
                    if (isManual) {
                        btn.innerText = "🔄 最新の情報に更新";
                        alert("最新の情報を読み込みました");
                    }
                })
                .getPortalAllData();
        }

        function refreshData() {
            loadDataFromServer(true);
        }

        function renderPortal(data) {
            document.getElementById('lastUpdateTime').innerText = "最終更新: " + data.lastUpdate;

            const newsArea = document.getElementById('newsArea');
            newsArea.innerHTML = '';
            data.news.forEach(item => {
                const div = document.createElement('div');
                div.className = 'info-card';
                div.innerHTML = `<strong>${item.date}</strong> ${item.text}`;
                newsArea.appendChild(div);
            });

            const container = document.getElementById('btnContainer');
            container.innerHTML = '';
            data.buttons.forEach((btn, index) => {
                const a = document.createElement('a');
                a.href = btn.url || "#";

                // 電話以外は別タブ（または別ブラウザ）で開く
                if (btn.url) {
                    if (btn.url.startsWith('tel:')) {
                        // 電話はそのまま
                    } else {
                        a.target = "_blank";
                        a.rel = "noopener noreferrer";
                    }
                }
                
                a.className = 'menu-btn';
                if (btn.color) a.style.backgroundColor = btn.color;
                
                // 特定のボタンを目立たせる（枠線）
                if (index === 4 || index === 5) {
                    a.style.border = "2px solid #333";
                }

                const displayName = btn.name.replace(/\n/g, '<br>');
                a.innerHTML = `
                    <div class="btn-icon">${btn.icon || '📝'}</div>
                    <div class="btn-text">${displayName}</div>
                `;
                
                a.setAttribute('data-search', (btn.name + (btn.note || "")).toLowerCase());
                container.appendChild(a);
            });
        }

        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const btns = document.querySelectorAll('.menu-btn');
            btns.forEach(btn => {
                const target = btn.getAttribute('data-search');
                btn.classList.toggle('hidden', !target.includes(query));
            });
        }
    </script>
</body>
</html>
